<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" width="120" height="180">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-opacity="0.2" flood-color="#3D3D3D"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Body -->
    <rect x="30" y="80" width="60" height="80" rx="10" ry="10" fill="#54A0FF" stroke="#3D3D3D" stroke-width="3"/>
    <!-- Arms -->
    <rect x="18" y="85" width="14" height="45" rx="7" ry="7" fill="#54A0FF" stroke="#3D3D3D" stroke-width="3"/>
    <rect x="88" y="85" width="14" height="45" rx="7" ry="7" fill="#54A0FF" stroke="#3D3D3D" stroke-width="3"/>
    <!-- Legs -->
    <rect x="38" y="155" width="16" height="20" rx="4" ry="4" fill="#3D3D3D"/>
    <rect x="66" y="155" width="16" height="20" rx="4" ry="4" fill="#3D3D3D"/>
    <!-- Shoes -->
    <rect x="35" y="168" width="22" height="8" rx="4" ry="4" fill="#3D3D3D"/>
    <rect x="63" y="168" width="22" height="8" rx="4" ry="4" fill="#3D3D3D"/>
    <!-- Collar -->
    <polygon points="45,80 60,95 75,80" fill="#FFFFFF" stroke="#3D3D3D" stroke-width="2" stroke-linejoin="round"/>
    <!-- Head -->
    <circle cx="60" cy="48" r="35" fill="#FFD9A0" stroke="#3D3D3D" stroke-width="3"/>
    <!-- Hair (neat, parted) -->
    <path d="M25,42 Q25,12 60,10 Q95,12 95,42 L90,35 Q85,18 60,16 Q35,18 30,35 Z" fill="#3D3D3D"/>
    <path d="M30,35 Q32,28 40,25" fill="none" stroke="#555" stroke-width="1.5"/>
    <!-- Glasses -->
    <rect x="38" y="40" width="18" height="14" rx="4" ry="4" fill="none" stroke="#3D3D3D" stroke-width="2.5"/>
    <rect x="64" y="40" width="18" height="14" rx="4" ry="4" fill="none" stroke="#3D3D3D" stroke-width="2.5"/>
    <line x1="56" y1="47" x2="64" y2="47" stroke="#3D3D3D" stroke-width="2"/>
    <line x1="38" y1="47" x2="32" y2="44" stroke="#3D3D3D" stroke-width="2"/>
    <line x1="82" y1="47" x2="88" y2="44" stroke="#3D3D3D" stroke-width="2"/>
    <!-- Eyes (confident) -->
    <circle cx="47" cy="48" r="3" fill="#3D3D3D"/>
    <circle cx="73" cy="48" r="3" fill="#3D3D3D"/>
    <circle cx="48" cy="47" r="1" fill="#FFFFFF"/>
    <circle cx="74" cy="47" r="1" fill="#FFFFFF"/>
    <!-- Confident smile -->
    <path d="M50,60 Q60,68 70,60" fill="none" stroke="#3D3D3D" stroke-width="2" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="40" cy="56" rx="5" ry="3" fill="#FF6B6B" opacity="0.3"/>
    <ellipse cx="80" cy="56" rx="5" ry="3" fill="#FF6B6B" opacity="0.3"/>
  </g>
</svg>
