<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" width="120" height="180">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-opacity="0.2" flood-color="#3D3D3D"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Body -->
    <rect x="30" y="80" width="60" height="80" rx="10" ry="10" fill="#FF6B6B" stroke="#3D3D3D" stroke-width="3"/>
    <!-- Left arm (holding notebook) -->
    <rect x="16" y="85" width="14" height="42" rx="7" ry="7" fill="#FF6B6B" stroke="#3D3D3D" stroke-width="3"/>
    <!-- Right arm (raised, determined) -->
    <rect x="90" y="78" width="14" height="42" rx="7" ry="7" fill="#FF6B6B" stroke="#3D3D3D" stroke-width="3" transform="rotate(10, 97, 78)"/>
    <!-- Notebook in left hand -->
    <rect x="4" y="118" width="24" height="32" rx="3" ry="3" fill="#54A0FF" stroke="#3D3D3D" stroke-width="2"/>
    <line x1="8" y1="126" x2="24" y2="126" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="8" y1="132" x2="22" y2="132" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="8" y1="138" x2="20" y2="138" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
    <!-- Fist (determined) -->
    <ellipse cx="97" cy="72" rx="8" ry="7" fill="#FFD9A0" stroke="#3D3D3D" stroke-width="2"/>
    <!-- Legs -->
    <rect x="38" y="155" width="16" height="20" rx="4" ry="4" fill="#3D3D3D"/>
    <rect x="66" y="155" width="16" height="20" rx="4" ry="4" fill="#3D3D3D"/>
    <!-- Shoes -->
    <rect x="35" y="168" width="22" height="8" rx="4" ry="4" fill="#3D3D3D"/>
    <rect x="63" y="168" width="22" height="8" rx="4" ry="4" fill="#3D3D3D"/>
    <!-- Head -->
    <circle cx="60" cy="48" r="35" fill="#FFD9A0" stroke="#3D3D3D" stroke-width="3"/>
    <!-- Hair (short, determined) -->
    <path d="M25,42 Q25,12 60,10 Q95,12 95,42 L90,35 Q85,20 60,16 Q35,20 30,35 Z" fill="#8B4513"/>
    <!-- Headband -->
    <path d="M26,32 Q60,22 94,32" fill="none" stroke="#FF6B6B" stroke-width="4" stroke-linecap="round"/>
    <!-- Eyes (determined, focused) -->
    <circle cx="47" cy="48" r="3.5" fill="#3D3D3D"/>
    <circle cx="73" cy="48" r="3.5" fill="#3D3D3D"/>
    <circle cx="48" cy="47" r="1.2" fill="#FFFFFF"/>
    <circle cx="74" cy="47" r="1.2" fill="#FFFFFF"/>
    <!-- Determined eyebrows -->
    <line x1="40" y1="38" x2="53" y2="40" stroke="#3D3D3D" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="80" y1="38" x2="67" y2="40" stroke="#3D3D3D" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Determined smile -->
    <path d="M50,60 L60,64 L70,60" fill="none" stroke="#3D3D3D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Blush -->
    <ellipse cx="40" cy="56" rx="5" ry="3" fill="#FF6B6B" opacity="0.3"/>
    <ellipse cx="80" cy="56" rx="5" ry="3" fill="#FF6B6B" opacity="0.3"/>
    <!-- Determination sparkle -->
    <polygon points="100,30 102,25 104,30 109,32 104,34 102,39 100,34 95,32" fill="#FF9F43" opacity="0.7"/>
  </g>
</svg>
