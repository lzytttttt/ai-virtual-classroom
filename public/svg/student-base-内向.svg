<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" width="120" height="180">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-opacity="0.2" flood-color="#3D3D3D"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Body (slightly hunched) -->
    <rect x="30" y="82" width="60" height="78" rx="10" ry="10" fill="#5CD859" stroke="#3D3D3D" stroke-width="3"/>
    <!-- Arms (close to body, shy) -->
    <rect x="22" y="88" width="12" height="40" rx="6" ry="6" fill="#5CD859" stroke="#3D3D3D" stroke-width="3"/>
    <rect x="86" y="88" width="12" height="40" rx="6" ry="6" fill="#5CD859" stroke="#3D3D3D" stroke-width="3"/>
    <!-- Hands clasped in front -->
    <ellipse cx="52" cy="130" rx="6" ry="5" fill="#FFD9A0" stroke="#3D3D3D" stroke-width="2"/>
    <ellipse cx="68" cy="130" rx="6" ry="5" fill="#FFD9A0" stroke="#3D3D3D" stroke-width="2"/>
    <!-- Legs -->
    <rect x="38" y="155" width="16" height="18" rx="4" ry="4" fill="#3D3D3D"/>
    <rect x="66" y="155" width="16" height="18" rx="4" ry="4" fill="#3D3D3D"/>
    <!-- Shoes -->
    <rect x="35" y="166" width="22" height="8" rx="4" ry="4" fill="#3D3D3D"/>
    <rect x="63" y="166" width="22" height="8" rx="4" ry="4" fill="#3D3D3D"/>
    <!-- Head (tilted slightly down) -->
    <g transform="translate(0, 3) rotate(-5, 60, 48)">
      <circle cx="60" cy="48" r="35" fill="#FFD9A0" stroke="#3D3D3D" stroke-width="3"/>
      <!-- Hair (long, covering part of face) -->
      <path d="M25,45 Q25,12 60,10 Q95,12 95,45 L92,55 Q88,30 60,18 Q32,30 28,55 Z" fill="#555"/>
      <path d="M28,55 L30,70 Q35,55 40,50" fill="#555"/>
      <path d="M92,55 L90,70 Q85,55 80,50" fill="#555"/>
      <!-- Eyes (looking down, shy) -->
      <path d="M42,50 Q47,46 52,50" fill="none" stroke="#3D3D3D" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M68,50 Q73,46 78,50" fill="none" stroke="#3D3D3D" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Small shy mouth -->
      <path d="M54,62 Q60,64 66,62" fill="none" stroke="#3D3D3D" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Blush (stronger for shy) -->
      <ellipse cx="40" cy="56" rx="6" ry="3.5" fill="#FF6B6B" opacity="0.35"/>
      <ellipse cx="80" cy="56" rx="6" ry="3.5" fill="#FF6B6B" opacity="0.35"/>
    </g>
  </g>
</svg>
