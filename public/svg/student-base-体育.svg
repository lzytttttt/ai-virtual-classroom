<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" width="120" height="180">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-opacity="0.2" flood-color="#3D3D3D"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Body (jersey) -->
    <rect x="28" y="80" width="64" height="80" rx="10" ry="10" fill="#54A0FF" stroke="#3D3D3D" stroke-width="3"/>
    <!-- Jersey number -->
    <text x="60" y="125" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF" font-family="Arial, sans-serif" opacity="0.8">7</text>
    <!-- Jersey stripe -->
    <rect x="28" y="95" width="64" height="6" fill="#FFFFFF" opacity="0.4"/>
    <!-- Arms (energetic, one up) -->
    <rect x="14" y="78" width="14" height="45" rx="7" ry="7" fill="#54A0FF" stroke="#3D3D3D" stroke-width="3" transform="rotate(-25, 21, 78)"/>
    <rect x="92" y="80" width="14" height="45" rx="7" ry="7" fill="#54A0FF" stroke="#3D3D3D" stroke-width="3" transform="rotate(15, 99, 80)"/>
    <!-- Hands (fists, energetic) -->
    <ellipse cx="12" cy="68" rx="7" ry="6" fill="#FFD9A0" stroke="#3D3D3D" stroke-width="2"/>
    <ellipse cx="108" cy="74" rx="7" ry="6" fill="#FFD9A0" stroke="#3D3D3D" stroke-width="2"/>
    <!-- Shorts -->
    <rect x="32" y="148" width="56" height="18" rx="6" ry="6" fill="#3D3D3D"/>
    <!-- Legs -->
    <rect x="38" y="160" width="16" height="16" rx="4" ry="4" fill="#FFD9A0"/>
    <rect x="66" y="160" width="16" height="16" rx="4" ry="4" fill="#FFD9A0"/>
    <!-- Sneakers -->
    <rect x="34" y="170" width="24" height="8" rx="4" ry="4" fill="#FFFFFF" stroke="#3D3D3D" stroke-width="2"/>
    <rect x="62" y="170" width="24" height="8" rx="4" ry="4" fill="#FFFFFF" stroke="#3D3D3D" stroke-width="2"/>
    <line x1="38" y1="174" x2="54" y2="174" stroke="#54A0FF" stroke-width="1.5"/>
    <line x1="66" y1="174" x2="82" y2="174" stroke="#54A0FF" stroke-width="1.5"/>
    <!-- Head -->
    <circle cx="60" cy="48" r="35" fill="#FFD9A0" stroke="#3D3D3D" stroke-width="3"/>
    <!-- Short spiky hair -->
    <path d="M25,42 Q25,12 60,10 Q95,12 95,42 L90,35 Q85,22 60,16 Q35,22 30,35 Z" fill="#3D3D3D"/>
    <!-- Hair spikes -->
    <polygon points="45,12 48,0 52,14" fill="#3D3D3D"/>
    <polygon points="58,10 62,-2 66,12" fill="#3D3D3D"/>
    <polygon points="72,14 76,2 78,16" fill="#3D3D3D"/>
    <!-- Sporty headband -->
    <path d="M26,30 Q60,20 94,30" fill="none" stroke="#FF9F43" stroke-width="6" stroke-linecap="round"/>
    <rect x="88" y="26" width="12" height="8" rx="2" ry="2" fill="#FF9F43" stroke="#3D3D3D" stroke-width="1.5" transform="rotate(15, 94, 30)"/>
    <!-- Eyes (energetic, wide) -->
    <circle cx="47" cy="48" r="4.5" fill="#3D3D3D"/>
    <circle cx="73" cy="48" r="4.5" fill="#3D3D3D"/>
    <circle cx="48" cy="46" r="2" fill="#FFFFFF"/>
    <circle cx="74" cy="46" r="2" fill="#FFFFFF"/>
    <!-- Energetic eyebrows -->
    <path d="M38,36 Q47,32 54,36" fill="none" stroke="#3D3D3D" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M66,36 Q73,32 82,36" fill="none" stroke="#3D3D3D" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Big grin -->
    <path d="M44,58 Q52,72 60,68 Q68,72 76,58" fill="#FFFFFF" stroke="#3D3D3D" stroke-width="2"/>
    <path d="M44,58 Q60,62 76,58" fill="none" stroke="#3D3D3D" stroke-width="2"/>
    <!-- Blush -->
    <ellipse cx="38" cy="55" rx="5" ry="3" fill="#FF6B6B" opacity="0.3"/>
    <ellipse cx="82" cy="55" rx="5" ry="3" fill="#FF6B6B" opacity="0.3"/>
    <!-- Energy lines -->
    <line x1="8" y1="58" x2="2" y2="55" stroke="#FF9F43" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="6" y1="65" x2="0" y2="65" stroke="#FF9F43" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="8" y1="72" x2="2" y2="75" stroke="#FF9F43" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
